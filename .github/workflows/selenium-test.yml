name: Selenium Automated Tests and Scraping

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-selenium:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm init -y
          npm install selenium-webdriver

      - name: Run Selenium Script
        run: node TON_VRAI_FICHIER.js
        env:
          NODE_ENV: production

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-results
          path: |
            *.png
            *.json
          if-no-files-found: warn
